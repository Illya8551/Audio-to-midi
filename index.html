<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI Piano - Working Sound</title>
<style>
  body { font-family: Arial; padding: 20px; background: #1a1a2e; color: white; max-width: 800px; margin: 0 auto; }
  select, button { padding: 10px; margin: 5px; font-size: 16px; }
  #note { font-size: 48px; font-weight: bold; color: #00ffcc; }
  .container { background: #16213e; padding: 20px; border-radius: 10px; margin: 10px 0; }
  .piano { display: flex; flex-wrap: wrap; margin-top: 20px; }
  .piano-key { width: 50px; height: 150px; background: white; border: 1px solid black; margin: 2px; cursor: pointer; }
  .black-key { background: black; width: 30px; height: 90px; margin-left: -15px; margin-right: -15px; z-index: 1; }
</style>
</head>
<body>
<h1>🎹 MIDI Пианино из микрофона</h1>

<div class="container">
  <h3>1. Выбери микрофон:</h3>
  <select id="micSelect"></select>
  <button id="startBtn">🎤 Запустить</button>
  <button id="stopBtn" disabled>⏹️ Стоп</button>
</div>

<div class="container">
  <h3>2. Распознанная нота:</h3>
  <div id="note">—</div>
  <div>Частота: <span id="freq">0</span> Гц</div>
  <div>Громкость: <span id="volume">0</span>%</div>
</div>

<div class="container">
  <div id="status">✅ Готов. Выберите микрофон и нажмите Старт</div>
</div>

<script>
let audioContext, source, stream, analyser;
let isRunning = false;
let currentNote = null;
let currentOscillator = null;
let currentGain = null;
let animationId = null;

// Простой детектор нот
class SimplePitchDetector {
  constructor(bufferSize, sampleRate) {
    this.bufferSize = bufferSize;
    this.sampleRate = sampleRate;
  }
  
  findPitch(buffer) {
    let maxCorr = 0;
    let maxOffset = -1;
    
    for (let offset = 20; offset < 1000; offset++) {
      let corr = 0;
      for (let i = 0; i < buffer.length - offset; i++) {
        corr += buffer[i] * buffer[i + offset];
      }
      if (corr > maxCorr) {
        maxCorr = corr;
        maxOffset = offset;
      }
    }
    
    if (maxOffset > 0 && maxCorr > 50) {
      const pitch = this.sampleRate / maxOffset;
      const clarity = Math.min(1, maxCorr / 500);
      return [pitch, clarity];
    }
    return [0, 0];
  }
}

let detector = null;

function log(msg) {
  document.getElementById('status').innerHTML = msg;
}

// Загрузка микрофонов
async function loadMicrophones() {
  try {
    await navigator.mediaDevices.getUserMedia({ audio: true })
      .then(s => s.getTracks().forEach(t => t.stop()));
    
    const devices = await navigator.mediaDevices.enumerateDevices();
    const micSelect = document.getElementById('micSelect');
    micSelect.innerHTML = '';
    
    devices.forEach(device => {
      if (device.kind === 'audioinput') {
        const option = document.createElement('option');
        option.value = device.deviceId;
        option.text = device.label || `Микрофон ${micSelect.length + 1}`;
        micSelect.appendChild(option);
      }
    });
    
    if (micSelect.children.length === 0) {
      log('❌ Микрофоны не найдены');
    } else {
      log('✅ Микрофоны загружены');
    }
  } catch(err) {
    log(`❌ Ошибка: ${err.message}`);
  }
}

// Функция для проигрывания ноты через динамик
function playNote(midiNote, velocity) {
  if (!audioContext) return;
  
  // Останавливаем текущую ноту
  if (currentOscillator) {
    try {
      currentOscillator.stop();
    } catch(e) {}
  }
  
  const frequency = 440 * Math.pow(2, (midiNote - 69) / 12);
  
  // Создаём осциллятор (звук)
  currentOscillator = audioContext.createOscillator();
  currentGain = audioContext.createGain();
  
  currentOscillator.type = 'sine'; // Можно изменить на 'triangle', 'sawtooth'
  currentOscillator.frequency.value = frequency;
  
  // Огибающая звука (атака, затухание)
  const now = audioContext.currentTime;
  currentGain.gain.setValueAtTime(0, now);
  currentGain.gain.linearRampToValueAtTime(velocity / 127, now + 0.01);
  currentGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);
  
  currentOscillator.connect(currentGain);
  currentGain.connect(audioContext.destination);
  
  currentOscillator.start();
  currentOscillator.stop(now + 0.8);
}

// Функция для остановки ноты
function stopNote() {
  if (currentOscillator) {
    try {
      currentOscillator.stop();
    } catch(e) {}
    currentOscillator = null;
    currentGain = null;
  }
}

// Запуск
document.getElementById('startBtn').onclick = async () => {
  if (isRunning) return;
  
  const micId = document.getElementById('micSelect').value;
  if (!micId) {
    log('⚠️ Выберите микрофон');
    return;
  }
  
  try {
    // Создаём аудиоконтекст
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume();
    
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { 
        deviceId: { exact: micId }, 
        noiseSuppression: true,
        echoCancellation: false,
        autoGainControl: true
      }
    });
    
    source = audioContext.createMediaStreamSource(stream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    source.connect(analyser);
    
    // Дополнительный анализатор для громкости
    const volumeAnalyser = audioContext.createAnalyser();
    volumeAnalyser.fftSize = 256;
    source.connect(volumeAnalyser);
    
    detector = new SimplePitchDetector(2048, audioContext.sampleRate);
    
    isRunning = true;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    log('🎧 Слушаю... Играйте на пианино или пойте в микрофон!');
    
    startDetection(volumeAnalyser);
    
  } catch(err) {
    log(`❌ Ошибка: ${err.message}`);
  }
};

// Стоп
document.getElementById('stopBtn').onclick = () => {
  if (animationId) cancelAnimationFrame(animationId);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stopNote();
  isRunning = false;
  currentNote = null;
  
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('note').innerHTML = '—';
  document.getElementById('freq').innerHTML = '0';
  document.getElementById('volume').innerHTML = '0';
  log('⏹️ Остановлено');
};

// Распознавание с громкостью
function startDetection(volumeAnalyser) {
  const buffer = new Float32Array(analyser.fftSize);
  const volumeBuffer = new Uint8Array(volumeAnalyser.frequencyBinCount);
  
  function detect() {
    if (!isRunning || !detector) return;
    
    // Измеряем громкость
    volumeAnalyser.getByteFrequencyData(volumeBuffer);
    let avgVolume = 0;
    for (let i = 0; i < volumeBuffer.length; i++) {
      avgVolume += volumeBuffer[i];
    }
    avgVolume = avgVolume / volumeBuffer.length;
    const volumePercent = Math.round((avgVolume / 255) * 100);
    document.getElementById('volume').innerHTML = volumePercent;
    
    // Распознаём ноту только если есть звук
    if (volumePercent > 5) {
      analyser.getFloatTimeDomainData(buffer);
      const [pitch, clarity] = detector.findPitch(buffer);
      
      if (pitch > 100 && pitch < 2000 && clarity > 0.6) {
        const midiNote = Math.round(12 * Math.log2(pitch / 440) + 69);
        const noteName = midiToNoteName(midiNote);
        
        document.getElementById('note').innerHTML = noteName;
        document.getElementById('freq').innerHTML = Math.round(pitch);
        
        // Если нота изменилась - играем новую
        if (currentNote !== midiNote) {
          if (currentNote !== null) {
            stopNote();
          }
          playNote(midiNote, Math.min(127, volumePercent * 1.5));
          currentNote = midiNote;
          log(`🎵 Играем ноту: ${noteName} (${Math.round(pitch)} Гц) Громкость: ${volumePercent}%`);
        }
      } else if (currentNote !== null) {
        stopNote();
        currentNote = null;
      }
    } else if (currentNote !== null) {
      stopNote();
      currentNote = null;
    }
    
    animationId = requestAnimationFrame(detect);
  }
  
  detect();
}

function midiToNoteName(midi) {
  const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
  const octave = Math.floor(midi / 12) - 1;
  return `${notes[midi % 12]}${octave}`;
}

// Запуск
window.addEventListener('load', () => {
  loadMicrophones();
});
</script>
</body>
</html>
