<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI Piano - No Libraries</title>
<style>
  body { font-family: Arial; padding: 20px; background: #1a1a2e; color: white; max-width: 800px; margin: 0 auto; }
  select, button { padding: 10px; margin: 5px; font-size: 16px; }
  #note { font-size: 48px; font-weight: bold; color: #00ffcc; }
  .container { background: #16213e; padding: 20px; border-radius: 10px; margin: 10px 0; }
</style>
</head>
<body>
<h1>🎹 MIDI Пианино из микрофона</h1>

<div class="container">
  <h3>1. Выбери микрофон:</h3>
  <select id="micSelect"></select>
  <button id="startBtn">🎤 Запустить</button>
  <button id="stopBtn" disabled>⏹️ Стоп</button>
</div>

<div class="container">
  <h3>2. Распознанная нота:</h3>
  <div id="note">—</div>
  <div>Частота: <span id="freq">0</span> Гц</div>
</div>

<div class="container">
  <div id="status">✅ Готов. Выберите микрофон и нажмите Старт</div>
</div>

<script>
let audioContext, source, stream, analyser;
let isRunning = false;
let currentNote = null;
let animationId = null;

// Простой детектор нот без внешних библиотек
class SimplePitchDetector {
  constructor(bufferSize, sampleRate) {
    this.bufferSize = bufferSize;
    this.sampleRate = sampleRate;
  }
  
  findPitch(buffer) {
    // Автокорреляция
    let maxCorr = 0;
    let maxOffset = -1;
    
    for (let offset = 20; offset < 1000; offset++) {
      let corr = 0;
      for (let i = 0; i < buffer.length - offset; i++) {
        corr += buffer[i] * buffer[i + offset];
      }
      if (corr > maxCorr) {
        maxCorr = corr;
        maxOffset = offset;
      }
    }
    
    if (maxOffset > 0 && maxCorr > 50) {
      const pitch = this.sampleRate / maxOffset;
      const clarity = Math.min(1, maxCorr / 500);
      return [pitch, clarity];
    }
    return [0, 0];
  }
}

let detector = null;

function log(msg) {
  document.getElementById('status').innerHTML = msg;
}

// Загрузка микрофонов
async function loadMicrophones() {
  try {
    // Запрашиваем разрешение
    await navigator.mediaDevices.getUserMedia({ audio: true })
      .then(s => s.getTracks().forEach(t => t.stop()));
    
    const devices = await navigator.mediaDevices.enumerateDevices();
    const micSelect = document.getElementById('micSelect');
    micSelect.innerHTML = '';
    
    devices.forEach(device => {
      if (device.kind === 'audioinput') {
        const option = document.createElement('option');
        option.value = device.deviceId;
        option.text = device.label || `Микрофон ${micSelect.length + 1}`;
        micSelect.appendChild(option);
      }
    });
    
    if (micSelect.children.length === 0) {
      log('❌ Микрофоны не найдены');
    } else {
      log('✅ Микрофоны загружены');
    }
  } catch(err) {
    log(`❌ Ошибка: ${err.message}`);
  }
}

// Запуск
document.getElementById('startBtn').onclick = async () => {
  if (isRunning) return;
  
  const micId = document.getElementById('micSelect').value;
  if (!micId) {
    log('⚠️ Выберите микрофон');
    return;
  }
  
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume();
    
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { deviceId: { exact: micId }, noiseSuppression: true }
    });
    
    source = audioContext.createMediaStreamSource(stream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    source.connect(analyser);
    
    detector = new SimplePitchDetector(2048, audioContext.sampleRate);
    
    isRunning = true;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    log('🎧 Слушаю... Играйте на пианино');
    
    startDetection();
    
  } catch(err) {
    log(`❌ Ошибка: ${err.message}`);
  }
};

// Стоп
document.getElementById('stopBtn').onclick = () => {
  if (animationId) cancelAnimationFrame(animationId);
  if (stream) stream.getTracks().forEach(t => t.stop());
  isRunning = false;
  currentNote = null;
  
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('note').innerHTML = '—';
  document.getElementById('freq').innerHTML = '0';
  log('⏹️ Остановлено');
};

// Распознавание
function startDetection() {
  const buffer = new Float32Array(analyser.fftSize);
  
  function detect() {
    if (!isRunning || !detector) return;
    
    analyser.getFloatTimeDomainData(buffer);
    const [pitch, clarity] = detector.findPitch(buffer);
    
    if (pitch > 100 && pitch < 2000 && clarity > 0.6) {
      const midiNote = Math.round(12 * Math.log2(pitch / 440) + 69);
      const noteName = midiToNoteName(midiNote);
      
      document.getElementById('note').innerHTML = noteName;
      document.getElementById('freq').innerHTML = Math.round(pitch);
      
      // Играем ноту через встроенный синтезатор
      if (currentNote !== midiNote) {
        playTone(pitch, 0.3);
        currentNote = midiNote;
        log(`🎵 Нота: ${noteName} (${Math.round(pitch)} Гц)`);
      }
    } else if (currentNote !== null) {
      currentNote = null;
    }
    
    animationId = requestAnimationFrame(detect);
  }
  
  detect();
}

// Проигрывание звука
function playTone(frequency, duration) {
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.type = 'sine';
  osc.frequency.value = frequency;
  gain.gain.value = 0.3;
  osc.connect(gain);
  gain.connect(audioContext.destination);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + duration);
  osc.stop(audioContext.currentTime + duration);
}

function midiToNoteName(midi) {
  const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
  const octave = Math.floor(midi / 12) - 1;
  return `${notes[midi % 12]}${octave}`;
}

// Запуск
window.addEventListener('load', () => {
  loadMicrophones();
});
</script>
</body>
</html>
