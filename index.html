<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MIDI Piano - Фикс микрофонов</title>
<style>
  body { font-family: Arial; padding: 20px; background: #1a1a2e; color: white; max-width: 800px; margin: 0 auto; }
  select, button, input { padding: 10px; margin: 5px; font-size: 16px; }
  #note { font-size: 48px; font-weight: bold; color: #00ffcc; }
  .container { background: #16213e; padding: 20px; border-radius: 10px; margin: 10px 0; }
  .filter-group { background: #0f3460; padding: 15px; border-radius: 8px; margin: 10px 0; }
  .filter-group label { display: inline-block; width: 260px; margin: 5px 0; }
  input[type="range"] { width: 200px; }
  .value-display { display: inline-block; margin-left: 10px; color: #00ffcc; }
  .mic-status { background: #2a6b4e; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
</style>
</head>
<body>
<h1>🎹 MIDI Пианино</h1>

<div class="container">
  <div class="mic-status" id="micStatus">🔴 Нажмите "Запросить доступ"</div>
  <button id="requestMicBtn">🎤 ЗАПРОСИТЬ ДОСТУП К МИКРОФОНУ</button>
  
  <h3 style="margin-top: 15px;">Выберите микрофон:</h3>
  <select id="micSelect" disabled>
    <option>Сначала нажмите кнопку выше</option>
  </select>
  <button id="startBtn" disabled>🎤 Запустить</button>
  <button id="stopBtn" disabled>⏹️ Стоп</button>
</div>

<div class="container">
  <h3>🎵 Текущая нота:</h3>
  <div id="note">—</div>
  <div>Частота: <span id="freq">0</span> Гц</div>
  <div>Чистота: <span id="clarity">0</span>% | Громкость: <span id="volume">0</span>%</div>
  <div>Задержка: <span id="latency">0</span> мс</div>
</div>

<div class="container">
  <h3>⚡ Настройки скорости:</h3>
  <div class="filter-group">
    <label>Ультра-быстрый режим:</label>
    <input type="checkbox" id="ultraFastMode" checked> Включен
  </div>
  <div class="filter-group">
    <label>Громкость выхода (1-127):</label>
    <input type="range" id="manualMidiVelocity" min="1" max="127" step="1" value="100">
    <span id="manualMidiVelocityVal">100</span>
  </div>
</div>

<script>
let audioContext, source, stream, analyser, volumeAnalyser;
let isRunning = false;
let currentMidiNote = null;
let activeOscillator = null;
let activeGain = null;
let animationId = null;
let mediaStream = null; // сохраняем стрим для остановки

// Таблица частот нот
const NOTE_FREQS = [];
for (let midi = 21; midi <= 108; midi++) {
  NOTE_FREQS[midi] = 440 * Math.pow(2, (midi - 69) / 12);
}

// Быстрый детектор
class FastPitchDetector {
  constructor(bufferSize, sampleRate) {
    this.bufferSize = bufferSize;
    this.sampleRate = sampleRate;
  }
  
  findPitch(buffer) {
    let maxCorr = 0;
    let maxOffset = -1;
    
    const minOffset = Math.floor(this.sampleRate / 2000);
    const maxOffset = Math.floor(this.sampleRate / 80);
    
    for (let offset = minOffset; offset < maxOffset && offset < buffer.length; offset += 2) {
      let corr = 0;
      for (let i = 0; i < buffer.length - offset; i += 4) {
        corr += buffer[i] * buffer[i + offset];
      }
      if (corr > maxCorr) {
        maxCorr = corr;
        maxOffset = offset;
      }
    }
    
    if (maxOffset > 0 && maxCorr > 30) {
      const pitch = this.sampleRate / maxOffset;
      const clarity = Math.min(1, maxCorr / 300);
      return [pitch, clarity];
    }
    return [0, 0];
  }
}

let detector = null;

function log(msg, isError = false) {
  const statusDiv = document.getElementById('micStatus');
  statusDiv.innerHTML = isError ? `❌ ${msg}` : `✅ ${msg}`;
  statusDiv.style.background = isError ? '#ff6b6b' : '#2a6b4e';
}

// ⭐ ГЛАВНОЕ: запрос доступа к микрофону и получение списка
async function requestMicrophoneAccess() {
  log('Запрашиваем доступ к микрофону...');
  
  try {
    // Сначала запрашиваем разрешение
    const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    // Сразу закрываем временный стрим
    tempStream.getTracks().forEach(track => track.stop());
    
    log('Доступ разрешён! Загружаем список микрофонов...');
    
    // Теперь можно получить список устройств
    const devices = await navigator.mediaDevices.enumerateDevices();
    const micSelect = document.getElementById('micSelect');
    micSelect.innerHTML = '';
    
    let micCount = 0;
    devices.forEach(device => {
      if (device.kind === 'audioinput') {
        micCount++;
        const option = document.createElement('option');
        option.value = device.deviceId;
        option.text = device.label || `Микрофон ${micCount}`;
        micSelect.appendChild(option);
      }
    });
    
    if (micCount === 0) {
      log('Микрофоны не найдены! Подключите микрофон.', true);
      micSelect.innerHTML = '<option>Микрофоны не найдены</option>';
      micSelect.disabled = true;
      document.getElementById('startBtn').disabled = true;
    } else {
      micSelect.disabled = false;
      document.getElementById('startBtn').disabled = false;
      log(`Найдено микрофонов: ${micCount}. Выберите нужный и нажмите "Запустить"`);
    }
    
  } catch(err) {
    log(`Ошибка: ${err.message}. Разрешите доступ к микрофону в браузере.`, true);
    console.error(err);
  }
}

// Запуск обработки звука
async function startProcessing() {
  if (isRunning) return;
  
  const micId = document.getElementById('micSelect').value;
  if (!micId || micId === 'Микрофоны не найдены') {
    log('Выберите микрофон из списка!', true);
    return;
  }
  
  try {
    log('Запускаем обработку звука...');
    
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume();
    
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { 
        deviceId: { exact: micId }, 
        noiseSuppression: true,
        echoCancellation: false,
        autoGainControl: true
      }
    });
    
    source = audioContext.createMediaStreamSource(mediaStream);
    
    const bufferSize = document.getElementById('ultraFastMode').checked ? 1024 : 2048;
    analyser = audioContext.createAnalyser();
    analyser.fftSize = bufferSize;
    source.connect(analyser);
    
    volumeAnalyser = audioContext.createAnalyser();
    volumeAnalyser.fftSize = 256;
    source.connect(volumeAnalyser);
    
    detector = new FastPitchDetector(bufferSize, audioContext.sampleRate);
    
    isRunning = true;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('requestMicBtn').disabled = true;
    log(`Работает! Буфер: ${bufferSize} samples`);
    
    startDetection();
    
  } catch(err) {
    log(`Ошибка запуска: ${err.message}`, true);
    console.error(err);
  }
}

function stopProcessing() {
  if (animationId) cancelAnimationFrame(animationId);
  
  if (mediaStream) {
    mediaStream.getTracks().forEach(track => track.stop());
    mediaStream = null;
  }
  
  if (activeOscillator) {
    try { activeOscillator.stop(); } catch(e) {}
    activeOscillator = null;
    activeGain = null;
  }
  
  isRunning = false;
  currentMidiNote = null;
  
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('note').innerHTML = '—';
  document.getElementById('freq').innerHTML = '0';
  document.getElementById('clarity').innerHTML = '0';
  document.getElementById('volume').innerHTML = '0';
  
  log('Остановлено. Можно выбрать другой микрофон.');
}

function playNote(midiNote, velocity) {
  if (!audioContext) return;
  
  const frequency = NOTE_FREQS[midiNote];
  const gainValue = Math.min(1, Math.max(0.05, velocity / 127));
  
  if (activeOscillator && currentMidiNote !== null) {
    try {
      activeOscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
      if (activeGain) activeGain.gain.setValueAtTime(gainValue, audioContext.currentTime);
    } catch(e) {}
  } else {
    if (activeOscillator) {
      try { activeOscillator.stop(); } catch(e) {}
    }
    
    activeOscillator = audioContext.createOscillator();
    activeGain = audioContext.createGain();
    activeOscillator.type = 'sine';
    activeOscillator.frequency.value = frequency;
    
    activeGain.gain.setValueAtTime(0, audioContext.currentTime);
    activeGain.gain.setValueAtTime(gainValue, audioContext.currentTime + 0.005);
    
    activeOscillator.connect(activeGain);
    activeGain.connect(audioContext.destination);
    activeOscillator.start();
  }
  
  currentMidiNote = midiNote;
}

function stopNote() {
  if (activeOscillator) {
    try {
      if (activeGain) {
        activeGain.gain.setValueAtTime(0, audioContext.currentTime);
        activeOscillator.stop(audioContext.currentTime + 0.05);
      } else {
        activeOscillator.stop();
      }
    } catch(e) {}
    activeOscillator = null;
    activeGain = null;
  }
  currentMidiNote = null;
}

function quantizePitchFast(pitch) {
  if (pitch <= 0) return null;
  
  let approxMidi = Math.round(12 * Math.log2(pitch / 440) + 69);
  let startMidi = Math.max(21, approxMidi - 2);
  let endMidi = Math.min(108, approxMidi + 2);
  
  let bestMidi = approxMidi;
  let bestDiff = Math.abs(pitch - NOTE_FREQS[approxMidi]);
  
  for (let midi = startMidi; midi <= endMidi; midi++) {
    const diff = Math.abs(pitch - NOTE_FREQS[midi]);
    if (diff < bestDiff) {
      bestDiff = diff;
      bestMidi = midi;
    }
  }
  
  return { midi: bestMidi, freq: NOTE_FREQS[bestMidi], diff: bestDiff };
}

function startDetection() {
  const buffer = new Float32Array(analyser.fftSize);
  const volumeBuffer = new Uint8Array(volumeAnalyser.frequencyBinCount);
  
  function detect() {
    const startTime = performance.now();
    
    if (!isRunning || !detector) {
      animationId = requestAnimationFrame(detect);
      return;
    }
    
    volumeAnalyser.getByteFrequencyData(volumeBuffer);
    let avgVolume = 0;
    for (let i = 0; i < volumeBuffer.length; i++) avgVolume += volumeBuffer[i];
    avgVolume = avgVolume / volumeBuffer.length;
    const inputVolumePercent = Math.round((avgVolume / 255) * 100);
    document.getElementById('volume').innerHTML = inputVolumePercent;
    
    let hasSound = (inputVolumePercent >= 3);
    let pitch = 0, clarity = 0;
    
    if (hasSound) {
      analyser.getFloatTimeDomainData(buffer);
      [pitch, clarity] = detector.findPitch(buffer);
      hasSound = (clarity > 0.4 && pitch > 80 && pitch < 2000);
    }
    
    document.getElementById('clarity').innerHTML = Math.round(clarity * 100);
    document.getElementById('freq').innerHTML = Math.round(pitch);
    
    if (hasSound && pitch > 0) {
      const quantized = quantizePitchFast(pitch);
      
      if (quantized) {
        const noteName = midiToNoteName(quantized.midi);
        document.getElementById('note').innerHTML = noteName;
        
        const velocity = parseInt(document.getElementById('manualMidiVelocity').value);
        
        if (currentMidiNote !== quantized.midi) {
          playNote(quantized.midi, velocity);
        }
      }
    } else if (currentMidiNote !== null) {
      stopNote();
      document.getElementById('note').innerHTML = '—';
    }
    
    const latency = Math.round(performance.now() - startTime);
    document.getElementById('latency').innerHTML = latency;
    
    animationId = requestAnimationFrame(detect);
  }
  
  detect();
}

function midiToNoteName(midi) {
  const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
  const octave = Math.floor(midi / 12) - 1;
  return `${notes[midi % 12]}${octave}`;
}

// UI
document.getElementById('requestMicBtn').onclick = requestMicrophoneAccess;
document.getElementById('startBtn').onclick = startProcessing;
document.getElementById('stopBtn').onclick = stopProcessing;
document.getElementById('manualMidiVelocity').oninput = () => {
  document.getElementById('manualMidiVelocityVal').innerText = document.getElementById('manualMidiVelocity').value;
};

// При загрузке страницы пробуем получить список (может сработать если разрешение уже есть)
window.addEventListener('load', () => {
  log('Нажмите "Запросить доступ к микрофону"');
});
</script>
</body>
</html>
