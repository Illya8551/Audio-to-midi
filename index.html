<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MIDI Piano - Быстрый + Фоновый режим</title>
<style>
  body { font-family: Arial; padding: 20px; background: #1a1a2e; color: white; max-width: 800px; margin: 0 auto; }
  select, button, input { padding: 10px; margin: 5px; font-size: 16px; }
  #note { font-size: 48px; font-weight: bold; color: #00ffcc; }
  .container { background: #16213e; padding: 20px; border-radius: 10px; margin: 10px 0; }
  .filter-group { background: #0f3460; padding: 15px; border-radius: 8px; margin: 10px 0; }
  .filter-group label { display: inline-block; width: 260px; margin: 5px 0; }
  input[type="range"] { width: 200px; }
  .value-display { display: inline-block; margin-left: 10px; color: #00ffcc; }
  .warning { background: #ff6b6b; padding: 10px; border-radius: 5px; margin-top: 10px; display: none; }
</style>
</head>
<body>
<h1>🎹 Быстрое MIDI Пианино</h1>

<div class="container">
  <h3>🎤 Микрофон:</h3>
  <select id="micSelect"></select>
  <button id="startBtn">🎤 Запустить</button>
  <button id="stopBtn" disabled>⏹️ Стоп</button>
</div>

<div class="container">
  <h3>🎵 Текущая нота:</h3>
  <div id="note">—</div>
  <div>Частота: <span id="freq">0</span> Гц</div>
  <div>Чистота: <span id="clarity">0</span>% | Громкость: <span id="volume">0</span>%</div>
  <div>Задержка ответа: <span id="latency">0</span> мс</div>
</div>

<div class="container">
  <h3>🎛️ Настройки:</h3>
  
  <div class="filter-group">
    <label>⚡ Ультра-быстрый режим:</label>
    <input type="checkbox" id="ultraFastMode" checked> 
    <span style="color:#00ffcc">Включен</span>
  </div>
  
  <div class="filter-group">
    <label>🎤 Режим HOLD:</label>
    <input type="checkbox" id="holdModeToggle"> 
    <span style="color:#00ffcc">Выключен</span><br>
    <label>Допустимое отклонение (Гц):</label>
    <input type="range" id="holdTolerance" min="1" max="15" step="1" value="5">
    <span id="holdToleranceVal" class="value-display">5 Гц</span>
  </div>
  
  <div class="filter-group">
    <label>🔊 Громкость от входа:</label>
    <input type="checkbox" id="useInputVolumeToggle"> 
    <span style="color:#00ffcc">Выключен</span><br>
    <label>Ручная (1-127):</label>
    <input type="range" id="manualMidiVelocity" min="1" max="127" step="1" value="100">
    <span id="manualMidiVelocityVal" class="value-display">100</span>
  </div>

  <div class="filter-group">
    <label>⏱️ Тишина перед стопом (мс):</label>
    <input type="range" id="silenceDelay" min="0" max="500" step="10" value="80">
    <span id="silenceDelayVal" class="value-display">80 мс</span>
  </div>
</div>

<div class="container">
  <div id="status">✅ Готов</div>
  <div id="wakeLockStatus" class="warning">⚠️ Экран может выключиться</div>
</div>

<script>
// ── Wake Lock ──────────────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wakeLockStatus').style.display = 'none';
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible' && !wakeLock) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      });
    } else {
      document.getElementById('wakeLockStatus').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('wakeLockStatus').style.display = 'block';
  }
}
function releaseWakeLock() { if (wakeLock) { wakeLock.release(); wakeLock = null; } }

// ── Таблица частот нот (21–108) ────────────────────────────
const NOTE_FREQS = new Float32Array(109);
for (let m = 21; m <= 108; m++) NOTE_FREQS[m] = 440 * Math.pow(2, (m - 69) / 12);

// Быстрый поиск MIDI-ноты по частоте (бинарный по таблице)
function freqToMidi(pitch) {
  let best = 69, bestDiff = 1e9;
  const approx = Math.round(12 * Math.log2(pitch / 440) + 69);
  const lo = Math.max(21, approx - 2), hi = Math.min(108, approx + 2);
  for (let m = lo; m <= hi; m++) {
    const d = Math.abs(pitch - NOTE_FREQS[m]);
    if (d < bestDiff) { bestDiff = d; best = m; }
  }
  return best;
}

// ── Детектор (автокорреляция) ─────────────────────────────
class PitchDetector {
  constructor(bufSize, sampleRate) {
    this.sr = sampleRate;
    this.minOff = Math.floor(sampleRate / 1600); // ~1600 Гц макс
    this.maxOff = Math.floor(sampleRate / 70);   // ~70 Гц мин
  }
  detect(buf) {
    let maxC = 0, bestOff = -1;
    for (let off = this.minOff; off < this.maxOff && off < buf.length; off += 1) {
      let c = 0;
      for (let i = 0; i < buf.length - off; i += 3) c += buf[i] * buf[i + off];
      if (c > maxC) { maxC = c; bestOff = off; }
    }
    if (bestOff > 0 && maxC > 25) {
      return [this.sr / bestOff, Math.min(1, maxC / 250)];
    }
    return [0, 0];
  }
}

// ── Состояние ─────────────────────────────────────────────
let audioCtx, stream, analyser, volAnalyser, detector;
let isRunning = false;
let rafId = null;
let currentMidi = null;
let osc = null, gainNode = null;
let silenceTimer = null;
let silenceFrames = 0;
const SILENCE_FRAMES_NEEDED = 3; // N подряд тихих фреймов → стоп

// ── UI ────────────────────────────────────────────────────
const holdToggle    = document.getElementById('holdModeToggle');
const holdTol       = document.getElementById('holdTolerance');
const ultraFast     = document.getElementById('ultraFastMode');
const velSlider     = document.getElementById('manualMidiVelocity');
const volToggle     = document.getElementById('useInputVolumeToggle');
const silDelay      = document.getElementById('silenceDelay');

holdTol.oninput  = () => document.getElementById('holdToleranceVal').innerText  = holdTol.value + ' Гц';
velSlider.oninput= () => document.getElementById('manualMidiVelocityVal').innerText = velSlider.value;
silDelay.oninput = () => document.getElementById('silenceDelayVal').innerText   = silDelay.value + ' мс';

function log(m) { document.getElementById('status').innerHTML = m; }

// ── Звук ──────────────────────────────────────────────────
function playNote(midi, velocity) {
  if (!audioCtx) return;
  const freq  = NOTE_FREQS[midi];
  const gain  = Math.max(0.05, Math.min(1, velocity / 127));
  const now   = audioCtx.currentTime;

  if (osc) {
    // Просто меняем частоту — без пересоздания осциллятора
    osc.frequency.setValueAtTime(freq, now);
    gainNode.gain.setValueAtTime(gain, now);
  } else {
    osc = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(gain, now + 0.008);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
  }
  currentMidi = midi;
}

function stopNote() {
  if (!osc) return;
  const now = audioCtx.currentTime;
  gainNode.gain.cancelScheduledValues(now);
  gainNode.gain.setValueAtTime(gainNode.gain.value, now);
  gainNode.gain.linearRampToValueAtTime(0, now + 0.04);
  osc.stop(now + 0.05);
  osc = null; gainNode = null; currentMidi = null;
}

// ── Микрофоны ─────────────────────────────────────────────
async function loadMicrophones() {
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
    tmp.getTracks().forEach(t => t.stop());
    const devs = await navigator.mediaDevices.enumerateDevices();
    const sel = document.getElementById('micSelect');
    sel.innerHTML = '';
    devs.filter(d => d.kind === 'audioinput').forEach((d, i) => {
      const o = document.createElement('option');
      o.value = d.deviceId;
      o.text  = d.label || `Микрофон ${i + 1}`;
      sel.appendChild(o);
    });
    log(sel.children.length ? '✅ Микрофоны загружены' : '❌ Микрофоны не найдены');
  } catch(e) { log('❌ ' + e.message); }
}

// ── Старт ─────────────────────────────────────────────────
document.getElementById('startBtn').onclick = async () => {
  if (isRunning) return;
  const micId = document.getElementById('micSelect').value;
  if (!micId) { log('⚠️ Выберите микрофон'); return; }
  try {
    await requestWakeLock();
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume();

    stream = await navigator.mediaDevices.getUserMedia({
      audio: { deviceId: { exact: micId }, noiseSuppression: false, echoCancellation: false, autoGainControl: false }
    });

    const src = audioCtx.createMediaStreamSource(stream);
    const bufSize = ultraFast.checked ? 512 : 1024;

    analyser = audioCtx.createAnalyser(); analyser.fftSize = bufSize;
    src.connect(analyser);

    volAnalyser = audioCtx.createAnalyser(); volAnalyser.fftSize = 256;
    src.connect(volAnalyser);

    detector = new PitchDetector(bufSize, audioCtx.sampleRate);
    silenceFrames = 0;
    isRunning = true;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled  = false;
    log(`🎧 Работает (буфер ${bufSize})`);
    loop();
  } catch(e) { log('❌ ' + e.message); }
};

// ── Стоп ──────────────────────────────────────────────────
document.getElementById('stopBtn').onclick = () => {
  isRunning = false;
  if (rafId) cancelAnimationFrame(rafId);
  if (silenceTimer) clearTimeout(silenceTimer);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stopNote();
  releaseWakeLock();
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled  = true;
  document.getElementById('note').innerHTML    = '—';
  log('⏹️ Остановлено');
};

// ── Главный цикл ──────────────────────────────────────────
let lastMidi = null;
const volBuf = new Uint8Array(128);

function loop() {
  if (!isRunning) return;
  const t0 = performance.now();

  // Громкость
  volAnalyser.getByteFrequencyData(volBuf);
  let sum = 0;
  for (let i = 0; i < volBuf.length; i++) sum += volBuf[i];
  const volPct = Math.round(sum / volBuf.length / 255 * 100);
  document.getElementById('volume').innerHTML = volPct;

  const silent = volPct < 3;

  if (!silent) {
    silenceFrames = 0;
    if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }

    // Детект высоты
    const pitchBuf = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(pitchBuf);
    const [pitch, clarity] = detector.detect(pitchBuf);

    document.getElementById('clarity').innerHTML = Math.round(clarity * 100);
    document.getElementById('freq').innerHTML    = Math.round(pitch);

    const valid = clarity > 0.35 && pitch > 70 && pitch < 2000;
    if (valid) {
      const midi = freqToMidi(pitch);

      // HOLD: не менять ноту если отклонение мало
      const hold = holdToggle.checked && lastMidi !== null &&
                   Math.abs(pitch - NOTE_FREQS[lastMidi]) < parseInt(holdTol.value);

      const targetMidi = hold ? lastMidi : midi;

      if (targetMidi !== currentMidi) {
        const vel = volToggle.checked
          ? Math.min(127, Math.max(30, volPct * 1.5))
          : parseInt(velSlider.value);
        playNote(targetMidi, vel);
        document.getElementById('note').innerHTML = midiName(targetMidi);
        lastMidi = targetMidi;
      }
    }
  } else {
    silenceFrames++;
    // Останавливаем ноту только после N тихих фреймов + задержка
    if (silenceFrames >= SILENCE_FRAMES_NEEDED && currentMidi !== null && !silenceTimer) {
      silenceTimer = setTimeout(() => {
        silenceTimer = null;
        if (currentMidi !== null) {
          stopNote();
          lastMidi = null;
          document.getElementById('note').innerHTML = '—';
        }
      }, parseInt(silDelay.value));
    }
  }

  document.getElementById('latency').innerHTML = Math.round(performance.now() - t0);
  rafId = requestAnimationFrame(loop);
}

function midiName(m) {
  return ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'][m % 12] + (Math.floor(m / 12) - 1);
}

window.addEventListener('load', loadMicrophones);
</script>
</body>
</html>
